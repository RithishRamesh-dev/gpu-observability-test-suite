[pytest]
# Pin rootdir so pytest always resolves imports relative to the project root,
# whether run locally, in Docker, or from a subdirectory.
# The rootdir is the directory containing this file.

# Test discovery
testpaths = tests

# Asyncio mode: auto allows async test functions without @pytest.mark.asyncio
asyncio_mode = auto

# Show the 10 slowest tests — useful for spotting unexpectedly slow workloads
# durations = 10

# Always show short tracebacks for live workload errors
# (override on the CLI with --tb=long when debugging)
addopts = --tb=short
